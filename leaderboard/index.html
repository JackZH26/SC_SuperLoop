<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC SuperLoop Discovery Registry</title>
<style>
  :root {
    --bg: #f4efe6;
    --panel: rgba(255, 250, 243, 0.92);
    --ink: #1e1d1a;
    --muted: #6c665c;
    --line: #d2c6b3;
    --accent: #9d2f1f;
    --accent-soft: #ead3cb;
    --good: #14532d;
    --warn: #92400e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(157,47,31,0.08), transparent 28%),
      linear-gradient(135deg, #efe5d5 0%, #f8f3eb 48%, #eee4d6 100%);
    min-height: 100vh;
  }
  .shell {
    max-width: 1380px;
    margin: 0 auto;
    padding: 28px 18px 40px;
  }
  .hero {
    background: var(--panel);
    border: 1px solid rgba(210,198,179,0.85);
    border-radius: 22px;
    padding: 26px 28px;
    box-shadow: 0 18px 60px rgba(74, 52, 31, 0.08);
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  h1 {
    margin: 0;
    font-size: clamp(30px, 4vw, 52px);
    line-height: 0.98;
    font-weight: 700;
  }
  .sub {
    margin-top: 14px;
    max-width: 920px;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.6;
  }
  .meta {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    margin-top: 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .meta strong { color: var(--ink); }
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin: 20px 0 12px;
  }
  .nav.bottom {
    margin: 18px 0 0;
    padding-bottom: 8px;
  }
  .nav .pager {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  button {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 999px;
    font: inherit;
    cursor: pointer;
  }
  button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .grid {
    display: grid;
    gap: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid rgba(210,198,179,0.95);
    border-radius: 18px;
    padding: 18px 18px 16px;
    box-shadow: 0 10px 30px rgba(74, 52, 31, 0.05);
  }
  .topline {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .rank {
    color: var(--accent);
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .formula {
    font-size: 28px;
    font-weight: 700;
  }
  .cid {
    color: var(--muted);
    font-size: 13px;
  }
  .badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .badge {
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.55);
  }
  .badge.e3 { background: rgba(20,83,45,0.10); color: var(--good); border-color: rgba(20,83,45,0.2); }
  .badge.e1 { background: rgba(157,47,31,0.08); color: var(--accent); border-color: rgba(157,47,31,0.18); }
  .details {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-top: 14px;
  }
  .cell {
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(210,198,179,0.75);
  }
  .label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .value {
    font-size: 15px;
    line-height: 1.35;
    word-break: break-word;
  }
  .summary {
    margin-top: 14px;
    font-size: 15px;
    line-height: 1.6;
  }
  .foot {
    margin-top: 12px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty {
    padding: 30px;
    text-align: center;
    color: var(--muted);
  }
  .page-note {
    color: var(--muted);
    font-size: 14px;
  }
  @media (max-width: 1100px) {
    .details { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 680px) {
    .shell { padding: 16px 12px 30px; }
    .hero { padding: 20px 16px; }
    .details { grid-template-columns: 1fr; }
    .formula { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="shell">
  <section class="hero">
    <div class="eyebrow">SC SuperLoop</div>
    <h1>Discovery Registry</h1>
    <div class="sub">这里展示的是已经公开导出的 discovery registry，而不是旧的 prescreen 候选榜单。页面会明确区分 known/rediscovery references、conditional/comparator records 与 exploratory DFT leads，避免把已知体系伪装成新预测。</div>
    <div class="meta">
      <div>Generated <strong id="generated">-</strong></div>
      <div>Total records <strong id="total">-</strong></div>
      <div>Current page <strong id="page-now">-</strong></div>
      <div>Page size <strong>20</strong></div>
    </div>
  </section>

  <div class="nav">
    <div class="pager">
      <button id="prev">前一页</button>
      <button id="next">后一页</button>
      <span id="page-label"></span>
    </div>
    <button id="refresh">刷新</button>
  </div>

  <section class="grid" id="records"></section>

  <div class="nav bottom">
    <div class="pager">
      <button id="prev-bottom">前一页</button>
      <button id="next-bottom">后一页</button>
      <span id="page-label-bottom" class="page-note"></span>
    </div>
    <div class="page-note">旧 leaderboard 入口现已切换为 discovery taxonomy 视图</div>
  </div>
</div>

<script>
  const pageFromUrl = () => {
    const params = new URLSearchParams(window.location.search);
    return Math.max(1, parseInt(params.get('page') || '1', 10) || 1);
  };

  let state = { page: pageFromUrl(), totalPages: 1 };

  function badgeClass(level) {
    if (level === 'known_or_rediscovery_reference') return 'badge e3';
    if (level === 'conditional_or_context_locked') return 'badge';
    return 'badge e1';
  }

  function formatValue(v) {
    if (v === null || v === undefined || v === '') return 'n/a';
    if (typeof v === 'number') return Number.isInteger(v) ? `${v}` : v.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
    if (Array.isArray(v)) return v.length ? v.join(', ') : 'none';
    return `${v}`;
  }

  function card(record) {
    return `
      <article class="card">
        <div class="topline">
          <div>
            <div class="rank">Rank ${record.rank}</div>
            <div class="formula">${record.formula}</div>
            <div class="cid">${record.candidate_id}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:15px">${record.branch}</div>
            <div class="foot">${record.structure_source || 'n/a'}</div>
          </div>
        </div>
        <div class="badges">
          <span class="${badgeClass(record.taxonomy_bucket)}">${formatValue(record.taxonomy_bucket)}</span>
          <span class="badge">${formatValue(record.display_class)}</span>
          <span class="badge">${formatValue(record.family_gate_stage)}</span>
          <span class="badge">${formatValue(record.public_confidence)}</span>
        </div>
        <div class="details">
          <div class="cell"><div class="label">Discovery</div><div class="value">${formatValue(record.discovery_score)}</div></div>
          <div class="cell"><div class="label">Lane</div><div class="value">${formatValue(record.lane_id)}</div></div>
          <div class="cell"><div class="label">Claim Level</div><div class="value">${formatValue(record.claim_level)}</div></div>
          <div class="cell"><div class="label">Next Action</div><div class="value">${formatValue(record.next_action)}</div></div>
          <div class="cell"><div class="label">Condition Badges</div><div class="value">${formatValue(record.condition_badges)}</div></div>
          <div class="cell"><div class="label">Prototype Family</div><div class="value">${formatValue(record.prototype_family)}</div></div>
          <div class="cell"><div class="label">Candidate Layer</div><div class="value">${formatValue(record.candidate_layer)}</div></div>
          <div class="cell"><div class="label">Ruleset</div><div class="value">${formatValue(record.family_ruleset_id)}</div></div>
        </div>
        <div class="summary"><strong>Mechanism:</strong> ${formatValue(record.mechanism_hypothesis)}</div>
        <div class="summary"><strong>Risks:</strong> ${formatValue(record.risk_tags)}</div>
        ${record.review_summary ? `<div class="summary"><strong>Review Summary:</strong> ${record.review_summary}</div>` : ''}
        ${record.provenance_summary ? `<div class="summary"><strong>Provenance:</strong> ${record.provenance_summary}</div>` : ''}
      </article>
    `;
  }

  async function load(page = state.page) {
    const res = await fetch(`/api/leaderboard?page=${page}`, { cache: 'no-store' });
    const data = await res.json();
    state.page = data.page;
    state.totalPages = data.totalPages;
    document.getElementById('generated').textContent = data.generated || '-';
    document.getElementById('total').textContent = data.totalRecords;
    document.getElementById('page-now').textContent = `${data.page}/${data.totalPages}`;
    document.getElementById('page-label').textContent = `Page ${data.page} of ${data.totalPages}`;
    document.getElementById('page-label-bottom').textContent = `第 ${data.page} / ${data.totalPages} 页`;
    document.getElementById('prev').disabled = data.page <= 1;
    document.getElementById('next').disabled = data.page >= data.totalPages;
    document.getElementById('prev-bottom').disabled = data.page <= 1;
    document.getElementById('next-bottom').disabled = data.page >= data.totalPages;
    document.getElementById('records').innerHTML = data.records.length
      ? data.records.map(card).join('')
      : `<div class="empty">No records.</div>`;
    const url = new URL(window.location.href);
    url.searchParams.set('page', data.page);
    history.replaceState({}, '', url);
  }

  document.getElementById('prev').addEventListener('click', () => load(state.page - 1));
  document.getElementById('next').addEventListener('click', () => load(state.page + 1));
  document.getElementById('prev-bottom').addEventListener('click', () => load(state.page - 1));
  document.getElementById('next-bottom').addEventListener('click', () => load(state.page + 1));
  document.getElementById('refresh').addEventListener('click', () => load(state.page));

  load();
</script>
</body>
</html>
